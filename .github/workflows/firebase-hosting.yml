name: Firebase Deploy (Disabled)

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  disabled:
    name: Firebase Deployment Disabled
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Deployment Notice
        run: |
          echo "========================================="
          echo " Firebase deployment is currently disabled."
          echo ""
          echo " This project is still under development."
          echo " Firebase Hosting deployment will be"
          echo " enabled after:"
          echo ""
          echo " 1. Firebase project is created"
          echo " 2. GitHub Secrets are configured"
          echo " 3. Production environment is ready"
          echo ""
          echo " No deployment has been performed."
          echo "========================================="

      - name: Finish
        run: echo "Workflow completed successfully."
