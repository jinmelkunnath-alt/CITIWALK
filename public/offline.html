<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <meta name="theme-color" content="#090610" />
  <title>Offline · CITIWALK Global Rewards</title>
  <style>
    *{box-sizing:border-box}body{margin:0;min-height:100vh;display:grid;place-items:center;padding:24px;background:radial-gradient(circle at 25% 10%,rgba(124,46,242,.2),transparent 35%),#090610;color:#f8f7fc;font-family:Manrope,system-ui,sans-serif}.card{width:min(620px,100%);padding:48px 28px;text-align:center;border:1px solid rgba(255,255,255,.1);border-radius:28px;background:rgba(255,255,255,.055);box-shadow:0 24px 80px rgba(3,1,12,.45);backdrop-filter:blur(24px)}.mark{display:grid;place-items:center;width:64px;height:64px;margin:auto;border-radius:20px;background:linear-gradient(135deg,#a779ff,#7c2ef2 55%,#f98607);font-weight:900;font-size:24px}.eyebrow{margin:24px 0 0;color:#c4adff;font-size:11px;font-weight:800;letter-spacing:.18em;text-transform:uppercase}h1{font-size:clamp(30px,7vw,46px);line-height:1.05;letter-spacing:-.05em;margin:16px 0}p{max-width:460px;margin:0 auto;color:#aea7bf;font-size:14px;line-height:1.8}button{margin-top:28px;border:0;border-radius:14px;padding:14px 22px;background:linear-gradient(135deg,#a779ff,#7c2ef2);color:#fff;font-weight:800;cursor:pointer;box-shadow:0 18px 60px rgba(124,46,242,.25)}button:focus-visible{outline:2px solid #c4adff;outline-offset:4px}
  </style>
</head>
<body>
  <main class="card">
    <div class="mark" aria-hidden="true">CW</div>
    <p class="eyebrow">Connection unavailable</p>
    <h1>You’re currently offline.</h1>
    <p>Static content may remain available, but registration, verification, participant status, and administrator data always require a fresh secure connection.</p>
    <button type="button" onclick="location.reload()">Try Again</button>
  </main>
</body>
</html>
